<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>Weather App</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="input-n-btn">
                <input type="text" class="input-box" placeholder="Enter Your Location"/>
                <button class="material-symbols-outlined" id="search-btn">Search</button>
            </div>
        </div>
            <div class="weather-body">
                <img src="./assets/clear.png" alt="Weather Image" class="weather-img"/>
                <div class="weather-box">
                    <P class="temprature">0°C</P>
                    <P class="description">Light Rain</P>
                </div>
                <div class="weather-details">
                    <div class="humidity">
                        <i class="material-symbols-outlined">humidity_high</i>
                        <div class="text">
                            <span id="humidity">45%</span>
                            <p>Humidity</p>
                        </div>
                    </div>
                    <div class="wind">
                        <i class="material-symbols-outlined">air</i>
                        <div class="text">
                            <span id="wind-speed">12Km/H</span>
                            <p>Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
